<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Paul_0s</title>

    <link rel="stylesheet" href="/style.css">
</head>

<body>

    <div id="intro">
        <video id="introVideo" autoplay muted playsinline>
            <source src="/comp1.mp4" type="video/mp4">
        </video>
    </div>

    <div id="crt"></div>

    <main id="site">

        <section class="hero">

            <div class="glow"></div>

            <h1 class="glitch" data-text="PAULO BORNSCHEUER">
                PAULO BORNSCHEUER
            </h1>

            <p id="typed"></p>

            <button onclick="scrollToProjects()">
                ACCEDER
            </button>

        </section>

        <section class="status">

            <div class="card">
                <h3>BLENDER</h3>
                <p>demonio del blender</p>
            </div>

            <div class="card">
                <h3>UNITY • UNREAL</h3>
                <p>creo saber hacer fortnite aqui</p>
            </div>

            <div class="card">
                <h3>CREATIVE CLOUD</h3>
                <p>se me crashea siempre pero algo sale</p>
            </div>

            <div class="card">
                <h3>MOHO</h3>
                <p>demonio del moho</p>
            </div>

        </section>

        <section id="projects">

            <h2>PROYECTOS</h2>

            <div class="grid">

                <!--  TARJETA 1 -->
                <div class="project" onclick="openModal(
                    'Proyecto Santiago',
                    'Shooter ambientado en Santiago con estética retro-futurista.',
                    [
                        { type: 'img', src: 'https://placehold.co/800x400' },
                        { type: 'video', src: '/comp1.mp4' }
                    ]
                )">
                    <img src="https://placehold.co/500x300">
                    <div class="overlay">
                        <h3>Proyecto Santiago</h3>
                    </div>
                </div>

                <!--  TARJETA 2 -->
                <div class="project" onclick="openModal(
                    'NOSCROLL',
                    'App para dejar de scrollear.',
                    [
                        { type: 'img', src: 'https://placehold.co/800x400' }
                    ]
                )">
                    <img src="https://placehold.co/500x300">
                    <div class="overlay">
                        <h3>NOSCROLL</h3>
                    </div>
                </div>

                <!--  TARJETA 3 -->
                <div class="project" onclick="openModal(
                    'Low Poly blender',
                    'Varios assets creados en blender con estetica retro low-poly.',
                    [
                        { type: 'img', src: 'https://placehold.co/800x400' },
                        { type: 'img', src: 'https://placehold.co/800x400' },
                        { type: 'img', src: 'https://placehold.co/800x400' },
                        { type: 'img', src: 'https://placehold.co/800x400' },
                        { type: 'img', src: 'https://placehold.co/800x400' },
                        { type: 'img', src: 'https://placehold.co/800x400' },
                        { type: 'img', src: 'https://placehold.co/800x400' },
                        { type: 'img', src: 'https://placehold.co/800x400' }

                    ]
                )">
                    <img src="https://placehold.co/500x300">
                    <div class="overlay">
                        <h3>Low Poly blender</h3>
                    </div>
                </div>

            </div>

        </section>

    </main>

    <!--  MODAL -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">

            <span class="close" onclick="closeModal()">×</span>

            <h2 id="modalTitle">Título</h2>

            <p id="modalDesc">Descripción</p>

            <div id="modalMedia"></div>

        </div>
    </div>


    <!--  BARRAS --> 
    <div class="side left">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <div class="side right">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>
    

    <canvas id="particles"></canvas>

    <script src="/script.js"></script>

</body>

</html>
